<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Helper AI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--s2:#21262d;--border:#30363d;--accent:#00d4aa;--a2:#7c5cfc;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--ai:#1a2332;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* SCREENS */
.screen{display:none;flex-direction:column;height:100vh;}
.screen.active{display:flex;}
/* AUTH */
#authScreen{align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,#1a1f35 0%,var(--bg) 70%);}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 30px;max-width:420px;width:100%;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
.auth-logo{width:90px;height:90px;border-radius:50%;display:block;margin:0 auto 14px;box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--accent),0 8px 30px rgba(0,212,170,0.3);}
.auth-card h1{text-align:center;font-size:22px;font-weight:900;background:linear-gradient(90deg,#00d4aa,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.auth-card .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px;}
.tabs{display:flex;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:20px;gap:4px;}
.tab{flex:1;padding:9px;border:none;background:none;color:var(--muted);border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14.5px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--accent);}
.auth-btn{width:100%;background:linear-gradient(135deg,#7c5cfc,#00d4aa);border:none;border-radius:12px;padding:13px;color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;transition:opacity 0.2s,transform 0.15s;}
.auth-btn:hover{opacity:0.9;transform:translateY(-1px);}
.auth-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}
/* MAIN APP */
#appScreen{background:var(--bg);}
/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:10;box-shadow:0 2px 20px rgba(0,0,0,0.4);}
.hdr-logo{width:38px;height:38px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--accent);}
.hdr-info h2{font-size:15px;font-weight:800;background:linear-gradient(90deg,#00d4aa,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-info p{font-size:11px;color:var(--muted);}
#onlineCnt{color:var(--green);font-weight:700;}
.hdr-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--s2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;transition:all 0.2s;}
.icon-btn:hover{background:var(--border);border-color:var(--accent);}
.icon-btn.call-voice{color:var(--green);}
.icon-btn.call-video{color:#3498db;}
.room-pill{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.room-pill span{color:var(--accent);}
/* Members */
.mbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;}
.mbar::-webkit-scrollbar{display:none;}
.mlbl{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
.mchip{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;font-size:12px;font-weight:700;}
.mchip .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
/* Messages */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.mrow{display:flex;align-items:flex-end;gap:8px;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mrow.me{flex-direction:row-reverse;}
.mav{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;}
.mav img{width:30px;height:30px;border-radius:50%;object-fit:cover;}
.bwrap{max-width:68%;}
.mrow.me .bwrap{align-items:flex-end;display:flex;flex-direction:column;}
.sndr{font-size:11px;font-weight:800;margin-bottom:2px;}
.bbl{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;}
.bbl.other{background:var(--s2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.bbl.mine{background:linear-gradient(135deg,#7c5cfc,#4a90d9);border-bottom-right-radius:4px;color:white;}
.bbl.ai{background:var(--ai);border:1px solid rgba(0,212,170,0.25);border-bottom-left-radius:4px;}
.btime{font-size:10px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.mrow.me .btime{text-align:right;}
.sysmsg{text-align:center;font-size:12px;color:var(--muted);padding:3px 0;font-weight:700;}
/* Typing */
.trow{display:flex;align-items:flex-end;gap:8px;}
.tdots{background:var(--ai);border:1px solid rgba(0,212,170,0.25);border-radius:18px;border-bottom-left-radius:4px;padding:11px 15px;display:flex;gap:5px;align-items:center;}
.tdots span{width:7px;height:7px;border-radius:50%;animation:td 1.2s infinite;}
.tdots span:nth-child(1){background:var(--accent);}
.tdots span:nth-child(2){background:var(--a2);animation-delay:.2s;}
.tdots span:nth-child(3){background:var(--accent);animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* Input */
.iarea{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;}
.at-hint{font-size:11px;color:var(--muted);padding:0 2px 4px;white-space:nowrap;}
.at-hint b{color:var(--accent);}
.iwrap{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:22px;padding:9px 14px;display:flex;align-items:center;transition:border-color 0.2s;}
.iwrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.08);}
#msgIn{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;resize:none;max-height:90px;overflow-y:auto;line-height:1.4;}
#msgIn::placeholder{color:var(--muted);}
.sbtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#00d4aa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 15px rgba(0,212,170,0.3);transition:transform 0.15s;}
.sbtn:hover{transform:scale(1.08);}
.sbtn:active{transform:scale(0.95);}
.sbtn svg{fill:white;}
/* CALL OVERLAY */
#callOverlay{display:none;position:fixed;inset:0;background:#0a0e1a;z-index:500;flex-direction:column;}
#callOverlay.active{display:flex;}
.call-bg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;position:relative;}
.call-videos{display:flex;gap:10px;width:100%;max-width:600px;flex-wrap:wrap;justify-content:center;}
.video-box{border-radius:16px;overflow:hidden;background:#111;border:2px solid var(--border);position:relative;}
.video-box.main{width:100%;max-width:560px;aspect-ratio:16/9;}
.video-box.self{width:130px;aspect-ratio:9/16;position:absolute;bottom:20px;right:20px;border:2px solid var(--accent);z-index:10;}
.video-box video{width:100%;height:100%;object-fit:cover;}
.video-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);border-radius:8px;padding:3px 8px;font-size:12px;font-weight:700;color:white;}
.call-avatar-box{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#00d4aa);display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 0 0 6px rgba(0,212,170,0.15),0 0 0 12px rgba(0,212,170,0.07);}
.call-name{font-size:22px;font-weight:800;color:white;}
.call-status{font-size:14px;color:var(--muted);}
.call-timer{font-size:18px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:700;}
.call-btns{display:flex;gap:16px;align-items:center;padding:24px;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);}
.cbtn{width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform 0.15s,opacity 0.2s;}
.cbtn:hover{transform:scale(1.1);}
.cbtn:active{transform:scale(0.95);}
.cbtn.mute{background:#333;}
.cbtn.camoff{background:#333;}
.cbtn.speaker{background:#333;}
.cbtn.end{background:var(--red);width:70px;height:70px;font-size:28px;}
.cbtn.active-tog{background:var(--a2);}
/* Incoming call */
#incomingCall{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:600;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
#incomingCall.active{display:flex;}
.inc-card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:36px 30px;text-align:center;max-width:320px;width:100%;animation:popIn 0.3s ease;}
.inc-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#00d4aa);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;animation:ring 1s infinite;}
@keyframes ring{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,0.4)}50%{box-shadow:0 0 0 20px rgba(0,212,170,0)}}
.inc-card h3{font-size:20px;font-weight:800;margin-bottom:4px;}
.inc-card p{color:var(--muted);font-size:13px;margin-bottom:24px;}
.inc-btns{display:flex;gap:16px;justify-content:center;}
.inc-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;font-size:26px;transition:transform 0.15s;}
.inc-btn:hover{transform:scale(1.1);}
.inc-btn.accept{background:var(--green);}
.inc-btn.decline{background:var(--red);}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:10px 20px;font-size:13px;font-weight:700;color:var(--accent);z-index:700;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Users list panel */
#usersPanel{display:none;position:fixed;top:0;right:0;bottom:0;width:260px;background:var(--surface);border-left:1px solid var(--border);z-index:100;flex-direction:column;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
#usersPanel.open{display:flex;}
.upHdr{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.upHdr h3{font-size:15px;font-weight:800;}
.upList{flex:1;overflow-y:auto;padding:10px;}
.uitem{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background 0.15s;}
.uitem:hover{background:var(--s2);}
.uitem-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:white;flex-shrink:0;}
.uitem-info{flex:1;}
.uitem-info .uname{font-size:14px;font-weight:700;}
.uitem-info .ustatus{font-size:11px;color:var(--green);}
.ucall-btns{display:flex;gap:6px;}
.ucbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;}
.ucbtn:hover{border-color:var(--accent);}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="screen active">
  <div class="auth-card">
    <img class="auth-logo" id="authLogo" src="" alt="Study Helper AI Logo">
    <h1>Study Helper AI</h1>
    <p class="sub">By Suvathikan • Free Study Chat & Calls</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>
    <!-- Login -->
    <div id="loginForm">
      <div class="field"><label>Username</label><input id="lUser" placeholder="Enter username" /></div>
      <div class="field"><label>Password</label><input id="lPass" type="password" placeholder="Enter password" /></div>
      <button class="auth-btn" onclick="doLogin()">Login →</button>
    </div>
    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="field"><label>Display Name</label><input id="rName" placeholder="Your full name" /></div>
      <div class="field"><label>Username</label><input id="rUser" placeholder="Choose a username" /></div>
      <div class="field"><label>Password</label><input id="rPass" type="password" placeholder="Choose a password" /></div>
      <button class="auth-btn" onclick="doRegister()">Create Account →</button>
    </div>
    <div class="auth-err" id="authErr"></div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:12px;">Also need Firebase setup — see instructions in download</div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="screen">
  <!-- Header -->
  <div class="hdr">
    <img class="hdr-logo" id="hdrLogo" src="" alt="logo">
    <div class="hdr-info">
      <h2>Study Helper AI</h2>
      <p><span id="onlineCnt">0</span> online • <span id="myNameBadge" style="color:var(--accent);font-weight:800;"></span></p>
    </div>
    <div class="hdr-actions">
      <div class="room-pill">Room: <span id="roomLbl">—</span></div>
      <button class="icon-btn call-voice" title="Voice Call" onclick="openCallModal('voice')">🎙️</button>
      <button class="icon-btn call-video" title="Video Call" onclick="openCallModal('video')">📹</button>
      <button class="icon-btn" title="Members" onclick="toggleUsersPanel()">👥</button>
      <button class="icon-btn" title="Share Room" onclick="shareRoom()">📋</button>
      <button class="icon-btn" title="Logout" onclick="logout()" style="color:var(--red);">⏻</button>
    </div>
  </div>
  <!-- Members bar -->
  <div class="mbar" id="mbar"><span class="mlbl">Online:</span></div>
  <!-- Messages -->
  <div class="msgs" id="msgs"></div>
  <!-- Input -->
  <div class="iarea">
    <div class="at-hint">Use <b>@ai</b></div>
    <div class="iwrap">
      <textarea id="msgIn" placeholder="Message... or @ai your question" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="sbtn" onclick="sendMsg()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- USERS PANEL -->
<div id="usersPanel">
  <div class="upHdr">
    <h3>Members</h3>
    <button class="icon-btn" onclick="toggleUsersPanel()">✕</button>
  </div>
  <div class="upList" id="upList"></div>
</div>

<!-- CALL OVERLAY -->
<div id="callOverlay">
  <div class="call-bg" id="callBg">
    <!-- Audio call UI -->
    <div id="callAudioUI" style="display:flex;flex-direction:column;align-items:center;gap:14px;">
      <div class="call-avatar-box" id="callAvatar">👤</div>
      <div class="call-name" id="callNameDisp">Calling...</div>
      <div class="call-status" id="callStatus">Connecting...</div>
      <div class="call-timer" id="callTimer" style="display:none">00:00</div>
    </div>
    <!-- Video call UI -->
    <div id="callVideoUI" style="display:none;width:100%;max-width:600px;position:relative;">
      <div class="video-box main"><video id="remoteVideo" autoplay playsinline></video><div class="video-label" id="remoteLabel">Remote</div></div>
      <div class="video-box self"><video id="localVideo" autoplay playsinline muted></video><div class="video-label">You</div></div>
    </div>
  </div>
  <div class="call-btns" style="justify-content:center;">
    <button class="cbtn mute" id="muteBtn" title="Mute" onclick="toggleMute()">🎙️</button>
    <button class="cbtn camoff" id="camBtn" title="Camera" onclick="toggleCamera()" style="display:none">📷</button>
    <button class="cbtn speaker" title="Speaker" onclick="toggleSpeaker()">🔊</button>
    <button class="cbtn end" onclick="endCall()">📵</button>
  </div>
</div>

<!-- INCOMING CALL -->
<div id="incomingCall">
  <div class="inc-card">
    <div class="inc-av" id="incAv">👤</div>
    <h3 id="incName">Someone</h3>
    <p id="incType">is calling you...</p>
    <div class="inc-btns">
      <button class="inc-btn decline" onclick="declineCall()">📵</button>
      <button class="inc-btn accept" onclick="acceptCall()">📞</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, get }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ======================================================
// REPLACE WITH YOUR FIREBASE CONFIG
// ======================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const COLORS=['#7c5cfc','#00d4aa','#f39c12','#e74c3c','#3498db','#e91e8c','#27ae60','#ff6b6b'];
const AI_PROMPT=`You are Study Helper AI, a friendly AI created by Suvathikan.
- Name: Study Helper AI. Creator/owner: Suvathikan.
- If asked who made/owns/created you → always say Suvathikan.
- You are NOT Claude or Anthropic for this app.
Help students with any study topic. Be friendly, concise, use emojis. Under 200 words unless detail needed.`;

let db, myName='', myUser='', myColor='', roomCode='', aiTyping=false;
let localStream=null, peerConn=null, callType='', callTarget='', callTimerInterval=null, callSeconds=0;
let mutedMic=false, camOff=false;

function hashColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xFFFFFF;return COLORS[Math.abs(h)%COLORS.length];}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`(.*?)`/g,'<code style="background:#0d1117;padding:1px 5px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:12px">$1</code>').replace(/\n/g,'<br>');}
function getTime(ts){return new Date(ts||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function toast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// AUTH
window.switchTab=function(tab){
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('authErr').textContent='';
};

window.doRegister=function(){
  const name=document.getElementById('rName').value.trim();
  const user=document.getElementById('rUser').value.trim().toLowerCase();
  const pass=document.getElementById('rPass').value.trim();
  const err=document.getElementById('authErr');
  if(!name||!user||!pass){err.textContent='Fill in all fields!';return;}
  if(user.length<3){err.textContent='Username must be 3+ chars';return;}
  if(pass.length<4){err.textContent='Password must be 4+ chars';return;}
  const users=JSON.parse(localStorage.getItem('sha_users')||'{}');
  if(users[user]){err.textContent='Username already taken!';return;}
  users[user]={name,pass,color:hashColor(user)};
  localStorage.setItem('sha_users',JSON.stringify(users));
  toast('Account created! Please login 🎉');
  switchTab('login');
  document.getElementById('lUser').value=user;
};

window.doLogin=function(){
  const user=document.getElementById('lUser').value.trim().toLowerCase();
  const pass=document.getElementById('lPass').value.trim();
  const err=document.getElementById('authErr');
  if(!user||!pass){err.textContent='Fill in all fields!';return;}
  const users=JSON.parse(localStorage.getItem('sha_users')||'{}');
  if(!users[user]||users[user].pass!==pass){err.textContent='Wrong username or password!';return;}
  myName=users[user].name; myUser=user; myColor=users[user].color;
  const room=prompt('Enter Room Code (share with friends):','studyroom');
  if(!room){return;}
  roomCode=room.trim().toLowerCase();
  startApp();
};

function startApp(){
  let app;
  try{app=initializeApp(firebaseConfig);}catch(e){toast('Firebase config needed — see setup instructions',5000);return;}
  db=getDatabase(app);
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('roomLbl').textContent=roomCode;
  document.getElementById('myNameBadge').textContent=myName;

  // Presence
  const presRef=ref(db,`rooms/${roomCode}/presence/${myUser}`);
  set(presRef,{name:myName,user:myUser,color:myColor,joined:Date.now()});
  onDisconnect(presRef).remove();

  // Watch presence
  onValue(ref(db,`rooms/${roomCode}/presence`),snap=>{
    const members=snap.val()||{};
    const names=Object.keys(members);
    document.getElementById('onlineCnt').textContent=names.length;
    const bar=document.getElementById('mbar');
    bar.innerHTML='<span class="mlbl">Online:</span>';
    const ul=document.getElementById('upList');
    ul.innerHTML='';
    names.forEach(u=>{
      const m=members[u];
      const chip=document.createElement('div');chip.className='mchip';chip.style.color=m.color||'#8b949e';
      chip.innerHTML=`<div class="dot"></div>${esc(m.name)}`;bar.appendChild(chip);
      const item=document.createElement('div');item.className='uitem';
      item.innerHTML=`<div class="uitem-av" style="background:${m.color}">${esc(m.name[0])}</div>
        <div class="uitem-info"><div class="uname">${esc(m.name)}</div><div class="ustatus">● Online</div></div>
        ${u!==myUser?`<div class="ucall-btns">
          <button class="ucbtn" title="Voice call" onclick="callUser('${u}','${m.name}','voice')">🎙️</button>
          <button class="ucbtn" title="Video call" onclick="callUser('${u}','${m.name}','video')">📹</button>
        </div>`:''}`;
      ul.appendChild(item);
    });
  });

  // Watch messages
  let firstLoad=true;
  onValue(ref(db,`rooms/${roomCode}/messages`),snap=>{
    const data=snap.val();
    const msgs=document.getElementById('msgs');
    msgs.innerHTML='';
    if(data)Object.values(data).sort((a,b)=>(a.ts||0)-(b.ts||0)).forEach(m=>renderMsg(m));
    if(firstLoad){msgs.scrollTop=msgs.scrollHeight;firstLoad=false;}
    else msgs.scrollTop=msgs.scrollHeight;
  });

  // Watch calls
  onValue(ref(db,`rooms/${roomCode}/calls/${myUser}`),snap=>{
    const call=snap.val();
    if(!call||call.status!=='ringing')return;
    showIncoming(call);
  });

  push(ref(db,`rooms/${roomCode}/messages`),{type:'system',text:`${myName} joined the room 👋`,ts:Date.now()});
}

function renderMsg(m){
  const msgs=document.getElementById('msgs');
  if(m.type==='system'){const d=document.createElement('div');d.className='sysmsg';d.textContent=m.text;msgs.appendChild(d);return;}
  const isMe=m.user===myUser,isAI=m.user==='__ai__';
  const row=document.createElement('div');row.className=`mrow${isMe?' me':''}`;
  const color=isAI?'#00d4aa':(m.color||'#7c5cfc');
  const bClass=isMe?'mine':isAI?'ai':'other';
  const avContent=isAI?`<img src="${document.getElementById('authLogo').src}" alt="AI">`:esc(m.name?.[0]||'?');
  const avStyle=isAI?'':`style="background:${color}"`;
  row.innerHTML=`<div class="mav" ${avStyle}>${avContent}</div>
    <div class="bwrap">
      ${!isMe?`<div class="sndr" style="color:${color}">${esc(isAI?'Study Helper AI':m.name)}</div>`:''}
      <div class="bbl ${bClass}">${fmt(m.text)}</div>
      <div class="btime">${getTime(m.ts)}</div>
    </div>`;
  msgs.appendChild(row);
}

window.sendMsg=async function(){
  const input=document.getElementById('msgIn');
  const text=input.value.trim();
  if(!text||!roomCode)return;
  input.value='';input.style.height='auto';
  push(ref(db,`rooms/${roomCode}/messages`),{user:myUser,name:myName,color:myColor,text,ts:Date.now()});
  if(text.toLowerCase().startsWith('@ai')&&!aiTyping){
    const q=text.slice(3).trim();if(!q)return;
    aiTyping=true;showAITyping();await callAI(q);aiTyping=false;
  }
};

function showAITyping(){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');row.className='trow';row.id='aiTyping';
  const logo=document.getElementById('authLogo').src;
  row.innerHTML=`<div class="mav"><img src="${logo}" alt="AI"></div>
    <div><div class="sndr" style="color:#00d4aa">Study Helper AI</div>
    <div class="tdots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function removeAITyping(){const t=document.getElementById('aiTyping');if(t)t.remove();}

async function callAI(q){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:AI_PROMPT,
        messages:[{role:'user',content:`${myName} asks: ${q}`}]})});
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||"Sorry, couldn't answer!";
    removeAITyping();
    push(ref(db,`rooms/${roomCode}/messages`),{user:'__ai__',name:'Study Helper AI',color:'#00d4aa',text:reply,ts:Date.now()});
  }catch(e){removeAITyping();push(ref(db,`rooms/${roomCode}/messages`),{user:'__ai__',name:'Study Helper AI',color:'#00d4aa',text:'Connection error. Try again 😅',ts:Date.now()});}
}

// CALLS
window.openCallModal=function(type){
  // Just start local preview for now (no specific target)
  startCall(type,'Group','everyone');
};
window.callUser=async function(targetUser,targetName,type){
  toggleUsersPanel();
  startCall(type,targetUser,targetName);
  // Signal via Firebase
  if(db)set(ref(db,`rooms/${roomCode}/calls/${targetUser}`),{
    from:myUser,fromName:myName,type,status:'ringing',ts:Date.now()
  });
};

async function startCall(type,targetUser,targetName){
  callType=type;callTarget=targetUser;
  document.getElementById('callOverlay').classList.add('active');
  document.getElementById('callNameDisp').textContent=targetName==='everyone'?'Group Call':targetName;
  document.getElementById('callStatus').textContent='Connecting...';
  document.getElementById('callTimer').style.display='none';
  const isVideo=type==='video';
  document.getElementById('callAudioUI').style.display=isVideo?'none':'flex';
  document.getElementById('callVideoUI').style.display=isVideo?'block':'none';
  document.getElementById('camBtn').style.display=isVideo?'flex':'none';
  document.getElementById('remoteLabel').textContent=targetName;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVideo});
    if(isVideo){document.getElementById('localVideo').srcObject=localStream;}
    document.getElementById('callStatus').textContent='Connected ✓';
    startCallTimer();
    toast(`${isVideo?'Video':'Voice'} call started 🎉`);
  }catch(e){
    document.getElementById('callStatus').textContent='Could not access '+( isVideo?'camera/mic':'microphone');
    toast('Permission denied for '+(isVideo?'camera':'microphone'),4000);
  }
}

function showIncoming(call){
  document.getElementById('incomingCall').classList.add('active');
  document.getElementById('incName').textContent=call.fromName;
  document.getElementById('incType').textContent=(call.type==='video'?'📹 Video':'🎙️ Voice')+' calling you...';
  window._pendingCall=call;
}

window.acceptCall=async function(){
  document.getElementById('incomingCall').classList.remove('active');
  const call=window._pendingCall;
  if(!call)return;
  if(db)set(ref(db,`rooms/${roomCode}/calls/${myUser}`),null);
  startCall(call.type,call.from,call.fromName);
};

window.declineCall=function(){
  document.getElementById('incomingCall').classList.remove('active');
  if(db&&window._pendingCall)set(ref(db,`rooms/${roomCode}/calls/${myUser}`),null);
  window._pendingCall=null;
};

window.endCall=function(){
  if(localStream)localStream.getTracks().forEach(t=>t.stop());
  localStream=null;
  document.getElementById('callOverlay').classList.remove('active');
  clearInterval(callTimerInterval);callSeconds=0;
  if(db&&callTarget)set(ref(db,`rooms/${roomCode}/calls/${callTarget}`),null);
  document.getElementById('localVideo').srcObject=null;
  document.getElementById('remoteVideo').srcObject=null;
  mutedMic=false;camOff=false;
  document.getElementById('muteBtn').textContent='🎙️';
  document.getElementById('camBtn').textContent='📷';
};

window.toggleMute=function(){
  mutedMic=!mutedMic;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!mutedMic);
  document.getElementById('muteBtn').textContent=mutedMic?'🔇':'🎙️';
  document.getElementById('muteBtn').classList.toggle('active-tog',mutedMic);
};
window.toggleCamera=function(){
  camOff=!camOff;
  if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);
  document.getElementById('camBtn').textContent=camOff?'🚫':'📷';
  document.getElementById('camBtn').classList.toggle('active-tog',camOff);
};
window.toggleSpeaker=function(){toast('Speaker toggle — use device volume buttons 🔊');};

function startCallTimer(){
  callSeconds=0;
  document.getElementById('callTimer').style.display='block';
  clearInterval(callTimerInterval);
  callTimerInterval=setInterval(()=>{
    callSeconds++;
    const m=String(Math.floor(callSeconds/60)).padStart(2,'0');
    const s=String(callSeconds%60).padStart(2,'0');
    document.getElementById('callTimer').textContent=`${m}:${s}`;
  },1000);
}

window.shareRoom=function(){
  const url=`${location.href.split('?')[0]}?room=${encodeURIComponent(roomCode)}`;
  navigator.clipboard.writeText(url).then(()=>toast('Link copied! Share with friends 🎉')).catch(()=>toast(`Room code: ${roomCode}`));
};
window.toggleUsersPanel=function(){document.getElementById('usersPanel').classList.toggle('open');};
window.logout=function(){
  if(db&&myUser)set(ref(db,`rooms/${roomCode}/presence/${myUser}`),null);
  myName='';myUser='';roomCode='';
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('msgs').innerHTML='';
};
window.handleKey=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
window.autoResize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';};

// Auto room from URL
const urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom){document.getElementById('lUser').focus();}
</script>

document.getElementById('authLogo').src=logoSrc;
document.getElementById('hdrLogo').src=logoSrc;
