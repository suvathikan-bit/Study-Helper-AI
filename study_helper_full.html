<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Helper AI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#7c5cfc;--text:#e6edf3;--muted:#8b949e;--online:#3fb950;--ai-bubble:#1a2332;--danger:#f85149;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* SETUP */
#setupScreen{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;backdrop-filter:blur(10px);}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 28px;max-width:380px;width:100%;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.setup-logo{width:90px;height:90px;border-radius:50%;margin:0 auto 14px;display:block;border:3px solid var(--accent);box-shadow:0 0 20px rgba(0,212,170,0.3);}
.setup-card h2{font-size:22px;font-weight:800;margin-bottom:5px;background:linear-gradient(90deg,#00d4aa,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.setup-card p{color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.6;}
.setup-card input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:border-color 0.2s;}
.setup-card input:focus{border-color:var(--accent);}
.setup-btn{width:100%;background:linear-gradient(135deg,#7c5cfc,#00d4aa);border:none;border-radius:12px;padding:13px;color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.setup-btn:hover{opacity:0.9;transform:translateY(-1px);}
.setup-note{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.5;}
.setup-note b{color:var(--accent);}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:10;flex-shrink:0;}
.h-logo{width:38px;height:38px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;flex-shrink:0;}
.h-info h1{font-size:15px;font-weight:800;background:linear-gradient(90deg,#00d4aa,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.h-info p{font-size:11px;color:var(--muted);}
#onlineCount{color:var(--online);font-weight:700;}
.h-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.room-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.room-id{color:var(--accent);font-weight:600;}
.hbtn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:12px;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all 0.2s;display:flex;align-items:center;gap:4px;}
.hbtn:hover{border-color:var(--accent);color:var(--accent);}
.hbtn.call-btn:hover{border-color:#3fb950;color:#3fb950;}
.hbtn.video-btn:hover{border-color:#3498db;color:#3498db;}

/* MEMBERS */
.members-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.members-bar::-webkit-scrollbar{display:none;}
.mlabel{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
.mchip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;font-size:11.5px;font-weight:700;}
.mchip .cdot{width:6px;height:6px;border-radius:50%;background:var(--online);flex-shrink:0;}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.msg-row{display:flex;align-items:flex-end;gap:7px;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.me{flex-direction:row-reverse;}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;overflow:hidden;}
.mav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.bwrap{max-width:70%;}
.msg-row.me .bwrap{display:flex;flex-direction:column;align-items:flex-end;}
.sndr{font-size:10.5px;font-weight:800;margin-bottom:2px;}
.bubble{padding:9px 12px;border-radius:16px;font-size:13.5px;line-height:1.55;word-break:break-word;}
.bubble.other{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px;}
.bubble.mine{background:linear-gradient(135deg,#7c5cfc,#4a90d9);border-bottom-right-radius:3px;color:white;}
.bubble.aiMsg{background:var(--ai-bubble);border:1px solid rgba(0,212,170,0.2);border-bottom-left-radius:3px;}
.btime{font-size:9.5px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.msg-row.me .btime{text-align:right;}
.sys-msg{text-align:center;font-size:11.5px;color:var(--muted);padding:3px 0;font-weight:700;}

/* TYPING */
.typing-row{display:flex;align-items:flex-end;gap:7px;}
.tdots{background:var(--ai-bubble);border:1px solid rgba(0,212,170,0.2);border-radius:16px;border-bottom-left-radius:3px;padding:11px 14px;display:flex;gap:4px;align-items:center;}
.tdots span{width:6px;height:6px;border-radius:50%;animation:tdot 1.2s infinite;}
.tdots span:nth-child(1){background:var(--accent);}
.tdots span:nth-child(2){background:var(--accent2);animation-delay:0.2s;}
.tdots span:nth-child(3){background:var(--accent);animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* INPUT */
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.at-hint{font-size:11px;color:var(--muted);padding:0 2px 3px;white-space:nowrap;}
.at-hint span{color:var(--accent);font-weight:800;}
.input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:22px;padding:9px 14px;display:flex;align-items:center;transition:border-color 0.2s;}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.08);}
#msgInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;resize:none;max-height:90px;overflow-y:auto;line-height:1.4;}
#msgInput::placeholder{color:var(--muted);}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#00d4aa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s;box-shadow:0 3px 12px rgba(0,212,170,0.3);}
.send-btn:hover{transform:scale(1.08);}
.send-btn:active{transform:scale(0.95);}
.send-btn svg{fill:white;}

/* ====== CALL OVERLAY ====== */
#callOverlay{position:fixed;inset:0;background:rgba(10,14,20,0.97);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:40px 20px 50px;backdrop-filter:blur(16px);}
#callOverlay.active{display:flex;}

.call-top{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.call-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);box-shadow:0 0 30px rgba(0,212,170,0.4);animation:ringPulse 2s infinite;}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,0.4)}50%{box-shadow:0 0 0 18px rgba(0,212,170,0)}}
.call-name{font-size:26px;font-weight:800;background:linear-gradient(90deg,#00d4aa,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.call-status{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:0.5px;}
.call-timer{font-size:22px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;display:none;}

/* Video grid */
.video-grid{width:100%;max-width:500px;display:none;gap:10px;flex:1;margin:20px 0;}
.video-grid.active{display:flex;}
.video-wrap{flex:1;background:#111;border-radius:16px;overflow:hidden;position:relative;min-height:160px;}
.video-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
.video-label{position:absolute;bottom:8px;left:10px;font-size:11px;font-weight:700;color:white;background:rgba(0,0,0,0.6);padding:3px 8px;border-radius:10px;}
.video-wrap.local-wrap{max-width:130px;flex:none;position:absolute;bottom:20px;right:20px;border:2px solid var(--accent);border-radius:12px;z-index:2;}

/* Call controls */
.call-controls{display:flex;gap:16px;align-items:center;}
.ctrl-btn{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform 0.15s,opacity 0.2s;font-family:'Nunito',sans-serif;}
.ctrl-btn:hover{transform:scale(1.1);}
.ctrl-btn:active{transform:scale(0.95);}
.ctrl-btn.mute-btn{background:var(--surface2);color:var(--text);}
.ctrl-btn.mute-btn.muted{background:var(--danger);color:white;}
.ctrl-btn.cam-btn{background:var(--surface2);color:var(--text);}
.ctrl-btn.cam-btn.off{background:#555;color:white;}
.ctrl-btn.end-btn{background:var(--danger);color:white;width:66px;height:66px;font-size:26px;}
.ctrl-btn.spk-btn{background:var(--surface2);color:var(--text);}

/* Incoming call */
#incomingCall{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:18px 24px;z-index:600;display:none;flex-direction:column;align-items:center;gap:12px;box-shadow:0 8px 40px rgba(0,212,170,0.3);min-width:280px;animation:slideDown 0.3s ease;}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#incomingCall.active{display:flex;}
.inc-top{display:flex;align-items:center;gap:12px;}
.inc-logo{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);}
.inc-info h3{font-size:15px;font-weight:800;}
.inc-info p{font-size:12px;color:var(--muted);}
.inc-btns{display:flex;gap:12px;}
.inc-btn{padding:9px 22px;border-radius:20px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:transform 0.15s;}
.inc-btn:active{transform:scale(0.95);}
.inc-btn.accept{background:#3fb950;color:white;}
.inc-btn.accept-vid{background:#3498db;color:white;}
.inc-btn.decline{background:var(--danger);color:white;}

/* Toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:9px 18px;font-size:12.5px;font-weight:700;color:var(--accent);z-index:700;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupScreen">
  <div class="setup-card">
    <img id="setupLogo" class="setup-logo" src="" alt="Study Helper AI Logo">
    <h2>Study Helper AI</h2>
    <p>Chat + voice & video call your friends!<br>Type <b style="color:var(--accent)">@ai</b> to ask the AI anything.</p>
    <input id="nameIn" placeholder="Your name..." maxlength="20"/>
    <input id="roomIn" placeholder="Room code (share with friends)..." maxlength="30"/>
    <button class="setup-btn" onclick="joinRoom()">Join Chat 🚀</button>
    <div class="setup-note">⚠️ Needs <b>Firebase</b> config + hosting. See instructions below.</div>
  </div>
</div>

<!-- INCOMING CALL -->
<div id="incomingCall">
  <div class="inc-top">
    <img class="inc-logo" id="incLogo" src="" alt="logo">
    <div class="inc-info">
      <h3 id="incCallerName">Someone</h3>
      <p id="incCallType">is calling you...</p>
    </div>
  </div>
  <div class="inc-btns">
    <button class="inc-btn accept" onclick="acceptCall(false)">📞 Voice</button>
    <button class="inc-btn accept-vid" onclick="acceptCall(true)">📹 Video</button>
    <button class="inc-btn decline" onclick="declineCall()">✕ Decline</button>
  </div>
</div>

<!-- CALL OVERLAY -->
<div id="callOverlay">
  <div class="call-top">
    <img id="callLogo" class="call-logo" src="" alt="logo">
    <div class="call-name" id="callWithName">Study Helper AI</div>
    <div class="call-status" id="callStatus">Calling...</div>
    <div class="call-timer" id="callTimer">00:00</div>
  </div>

  <div class="video-grid" id="videoGrid">
    <div class="video-wrap" style="position:relative;flex:1;">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="video-label" id="remoteLabel">Friend</div>
    </div>
    <div class="video-wrap local-wrap">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="video-label">You</div>
    </div>
  </div>

  <div class="call-controls">
    <button class="ctrl-btn mute-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🎤</button>
    <button class="ctrl-btn cam-btn" id="camBtn" onclick="toggleCam()" title="Camera" style="display:none">📷</button>
    <button class="ctrl-btn end-btn" onclick="endCall()" title="End call">📵</button>
    <button class="ctrl-btn spk-btn" onclick="toggleSpeaker()" title="Speaker">🔊</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <img id="headerLogo" class="h-logo" src="" alt="logo">
  <div class="h-info">
    <h1>Study Helper AI</h1>
    <p><span id="onlineCount">0</span> online · <span id="myNameLabel" style="color:var(--accent2)"></span></p>
  </div>
  <div class="h-right">
    <div class="room-badge">Room: <span class="room-id" id="roomLabel">—</span></div>
    <button class="hbtn call-btn" onclick="startCall(false)" id="voiceCallBtn" style="display:none">📞 Call</button>
    <button class="hbtn video-btn" onclick="startCall(true)" id="videoCallBtn" style="display:none">📹 Video</button>
    <button class="hbtn" onclick="shareRoom()">📋 Share</button>
  </div>
</div>

<!-- MEMBERS -->
<div class="members-bar" id="membersBar">
  <span class="mlabel">Online:</span>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="at-hint">Use <span>@ai</span></div>
  <div class="input-wrap">
    <textarea id="msgInput" placeholder="Message... or @ai your question" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" onclick="sendMsg()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, get }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// =====================================================================
// REPLACE WITH YOUR FIREBASE CONFIG
// firebase.google.com → New Project → Add Web App → Copy config
// Also enable Realtime Database in test mode
// =====================================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const COLORS=['#7c5cfc','#00d4aa','#f39c12','#e74c3c','#3498db','#e91e8c','#27ae60','#ff6b6b'];
const SYSTEM_PROMPT=`You are Study Helper AI, a friendly AI study assistant created by Suvathikan.
- Your name: Study Helper AI. Creator/Owner: Suvathikan.
- If asked who made you/owns you → always say Suvathikan.
- Not Claude, not Anthropic for this app.
Help students with any school topic. Be friendly, concise, use emojis. Max ~200 words unless detail needed.`;

const ICE_SERVERS={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

let myName='',roomCode='',myColor='',aiTyping=false,db;
let peerConn=null,localStream=null,callTimerInt=null,callSeconds=0;
let isMuted=false,isCamOff=false,isVideoCall=false,callPartner='';
let membersMap={};

function hashColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xFFFFFF;return COLORS[Math.abs(h)%COLORS.length];}
function getTime(ts){return new Date(ts||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`(.*?)`/g,'<code style="background:#0d1117;padding:1px 5px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:11px">$1</code>').replace(/\n/g,'<br>');}
function toast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function fmtTimer(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}

// ── LOGO ─────────────────────────────────────────────────────────────
const LOGO_SRC = 'LOGO_PLACEHOLDER';
document.querySelectorAll('img[id$="Logo"],img[id="incLogo"]').forEach(el=>el.src=LOGO_SRC);

// ── JOIN ROOM ─────────────────────────────────────────────────────────
window.joinRoom = function(){
  const n=document.getElementById('nameIn').value.trim();
  const r=document.getElementById('roomIn').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!n||!r){toast('Enter your name and room code!');return;}
  myName=n; roomCode=r; myColor=hashColor(n);
  let app;
  try{app=initializeApp(firebaseConfig);}
  catch(e){toast('Firebase not configured yet! See setup instructions.',6000);return;}
  db=getDatabase(app);
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('roomLabel').textContent=roomCode;
  document.getElementById('myNameLabel').textContent=myName;
  document.getElementById('voiceCallBtn').style.display='flex';
  document.getElementById('videoCallBtn').style.display='flex';

  // Presence
  const presRef=ref(db,`rooms/${roomCode}/presence/${myName}`);
  set(presRef,{name:myName,color:myColor,joined:Date.now()});
  onDisconnect(presRef).remove();

  // Watch presence
  onValue(ref(db,`rooms/${roomCode}/presence`),snap=>{
    membersMap=snap.val()||{};
    const names=Object.keys(membersMap);
    document.getElementById('onlineCount').textContent=names.length;
    const bar=document.getElementById('membersBar');
    bar.innerHTML='<span class="mlabel">Online:</span>';
    names.forEach(nm=>{
      const chip=document.createElement('div');chip.className='mchip';
      chip.style.color=membersMap[nm]?.color||'#8b949e';
      chip.innerHTML=`<div class="cdot"></div>${esc(nm)}`;
      bar.appendChild(chip);
    });
  });

  // Watch messages
  let firstLoad=true;
  onValue(ref(db,`rooms/${roomCode}/messages`),snap=>{
    const data=snap.val();
    const msgs=document.getElementById('messages');
    msgs.innerHTML='';
    if(data) Object.values(data).sort((a,b)=>(a.ts||0)-(b.ts||0)).forEach(m=>renderMsg(m));
    if(firstLoad){msgs.scrollTop=msgs.scrollHeight;firstLoad=false;}
    else msgs.scrollTop=msgs.scrollHeight;
  });

  // Watch signaling
  onValue(ref(db,`rooms/${roomCode}/signals/${myName}`),snap=>{
    const sig=snap.val();
    if(!sig) return;
    handleSignal(sig);
  });

  push(ref(db,`rooms/${roomCode}/messages`),{type:'system',text:`${myName} joined the room 👋`,ts:Date.now()});
};

// ── MESSAGES ─────────────────────────────────────────────────────────
function renderMsg(m){
  const msgs=document.getElementById('messages');
  if(m.type==='system'){
    const d=document.createElement('div');d.className='sys-msg';d.textContent=m.text;msgs.appendChild(d);return;
  }
  const isMe=m.sender===myName,isAI=m.sender==='Study Helper AI';
  const row=document.createElement('div');row.className=`msg-row${isMe?' me':''}`;
  const color=isAI?'#00d4aa':(m.color||'#7c5cfc');
  const bClass=isMe?'mine':isAI?'aiMsg':'other';
  const avContent=isAI?`<img src="${LOGO_SRC}" alt="AI">`:m.sender[0].toUpperCase();
  const avBg=isAI?'transparent':color;
  row.innerHTML=`
    <div class="mav" style="background:${avBg}">${avContent}</div>
    <div class="bwrap">
      ${!isMe?`<div class="sndr" style="color:${color}">${esc(m.sender)}</div>`:''}
      <div class="bubble ${bClass}">${fmt(m.text)}</div>
      <div class="btime">${getTime(m.ts)}</div>
    </div>`;
  msgs.appendChild(row);
}

window.sendMsg = async function(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text||!roomCode)return;
  input.value='';input.style.height='auto';
  push(ref(db,`rooms/${roomCode}/messages`),{sender:myName,color:myColor,text,ts:Date.now()});
  if(text.toLowerCase().startsWith('@ai')&&!aiTyping){
    const q=text.slice(3).trim();if(!q)return;
    aiTyping=true;showAITyping();await callAI(q);aiTyping=false;
  }
};

function showAITyping(){
  const msgs=document.getElementById('messages');
  const row=document.createElement('div');row.className='typing-row';row.id='aiTyping';
  row.innerHTML=`<div class="mav" style="background:transparent"><img src="${LOGO_SRC}" alt="AI" style="width:28px;height:28px;border-radius:50%;object-fit:cover;"></div>
    <div><div class="sndr" style="color:#00d4aa">Study Helper AI</div>
    <div class="tdots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function removeAITyping(){const t=document.getElementById('aiTyping');if(t)t.remove();}

async function callAI(q){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:[{role:'user',content:`${myName} asks: ${q}`}]})});
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||"Couldn't answer that, sorry!";
    removeAITyping();
    push(ref(db,`rooms/${roomCode}/messages`),{sender:'Study Helper AI',color:'#00d4aa',text:reply,ts:Date.now()});
  }catch(e){removeAITyping();push(ref(db,`rooms/${roomCode}/messages`),{sender:'Study Helper AI',color:'#00d4aa',text:'Connection error 😅 Try again!',ts:Date.now()});}
}

// ── WEBRTC CALLING ────────────────────────────────────────────────────
async function getMedia(video){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video});
    if(video) document.getElementById('localVideo').srcObject=localStream;
    return true;
  }catch(e){toast('Could not access mic/camera. Check permissions!',5000);return false;}
}

window.startCall = async function(withVideo){
  const others=Object.keys(membersMap).filter(n=>n!==myName);
  if(others.length===0){toast('No one else is in the room yet!');return;}
  // Call first other person found
  callPartner=others[0];
  isVideoCall=withVideo;
  if(!await getMedia(withVideo))return;

  peerConn=new RTCPeerConnection(ICE_SERVERS);
  localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));

  peerConn.onicecandidate=e=>{
    if(e.candidate) set(ref(db,`rooms/${roomCode}/signals/${callPartner}`),{type:'candidate',candidate:e.candidate.toJSON(),from:myName,video:withVideo});
  };
  peerConn.ontrack=e=>{
    document.getElementById('remoteVideo').srcObject=e.streams[0];
  };

  const offer=await peerConn.createOffer();
  await peerConn.setLocalDescription(offer);
  await set(ref(db,`rooms/${roomCode}/signals/${callPartner}`),{type:'offer',sdp:offer.sdp,from:myName,video:withVideo});

  showCallOverlay(callPartner,'Calling...',withVideo);
  push(ref(db,`rooms/${roomCode}/messages`),{type:'system',text:`📞 ${myName} is calling ${callPartner}...`,ts:Date.now()});
};

async function handleSignal(sig){
  if(sig.type==='offer'&&sig.from!==myName){
    // Incoming call
    callPartner=sig.from;
    isVideoCall=sig.video||false;
    showIncoming(sig.from,isVideoCall);
    window._pendingOffer=sig;
  } else if(sig.type==='answer'&&sig.from!==myName){
    if(peerConn&&peerConn.signalingState!=='stable'){
      await peerConn.setRemoteDescription({type:'answer',sdp:sig.sdp});
      onCallConnected();
    }
  } else if(sig.type==='candidate'&&sig.from!==myName){
    try{if(peerConn) await peerConn.addIceCandidate(sig.candidate);}catch(e){}
  } else if(sig.type==='end'&&sig.from!==myName){
    endCall(true);
  }
}

function showIncoming(caller,video){
  document.getElementById('incCallerName').textContent=caller;
  document.getElementById('incCallType').textContent=video?'Video call incoming 📹':'Voice call incoming 📞';
  document.getElementById('incomingCall').classList.add('active');
}

window.acceptCall = async function(forceVideo){
  document.getElementById('incomingCall').classList.remove('active');
  const sig=window._pendingOffer;
  if(!sig)return;
  const useVideo=forceVideo||isVideoCall;
  if(!await getMedia(useVideo))return;

  peerConn=new RTCPeerConnection(ICE_SERVERS);
  localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
  peerConn.onicecandidate=e=>{
    if(e.candidate) set(ref(db,`rooms/${roomCode}/signals/${callPartner}`),{type:'candidate',candidate:e.candidate.toJSON(),from:myName});
  };
  peerConn.ontrack=e=>{
    document.getElementById('remoteVideo').srcObject=e.streams[0];
  };
  await peerConn.setRemoteDescription({type:'offer',sdp:sig.sdp});
  const answer=await peerConn.createAnswer();
  await peerConn.setLocalDescription(answer);
  await set(ref(db,`rooms/${roomCode}/signals/${callPartner}`),{type:'answer',sdp:answer.sdp,from:myName});
  showCallOverlay(callPartner,'Connecting...',useVideo);
  onCallConnected();
};

window.declineCall = function(){
  document.getElementById('incomingCall').classList.remove('active');
  if(callPartner) set(ref(db,`rooms/${roomCode}/signals/${callPartner}`),{type:'end',from:myName});
  window._pendingOffer=null;
  toast('Call declined.');
};

function onCallConnected(){
  document.getElementById('callStatus').style.display='none';
  document.getElementById('callTimer').style.display='block';
  callSeconds=0;
  callTimerInt=setInterval(()=>{callSeconds++;document.getElementById('callTimer').textContent=fmtTimer(callSeconds);},1000);
  push(ref(db,`rooms/${roomCode}/messages`),{type:'system',text:`📞 ${myName} & ${callPartner} are on a call`,ts:Date.now()});
}

function showCallOverlay(partner,status,video){
  document.getElementById('callWithName').textContent=partner;
  document.getElementById('callStatus').textContent=status;
  document.getElementById('callStatus').style.display='block';
  document.getElementById('callTimer').style.display='none';
  document.getElementById('remoteLabel').textContent=partner;
  const grid=document.getElementById('videoGrid');
  const camBtn=document.getElementById('camBtn');
  if(video){grid.classList.add('active');camBtn.style.display='flex';}
  else{grid.classList.remove('active');camBtn.style.display='none';}
  document.getElementById('callOverlay').classList.add('active');
}

window.endCall = function(fromRemote=false){
  if(!fromRemote&&callPartner&&db)
    set(ref(db,`rooms/${roomCode}/signals/${callPartner}`),{type:'end',from:myName});
  if(peerConn){peerConn.close();peerConn=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  clearInterval(callTimerInt);
  document.getElementById('callOverlay').classList.remove('active');
  document.getElementById('videoGrid').classList.remove('active');
  document.getElementById('localVideo').srcObject=null;
  document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('incomingCall').classList.remove('active');
  isMuted=false;isCamOff=false;
  document.getElementById('muteBtn').textContent='🎤';
  document.getElementById('muteBtn').classList.remove('muted');
  if(roomCode) push(ref(db,`rooms/${roomCode}/messages`),{type:'system',text:`📵 Call ended (${fmtTimer(callSeconds)})`,ts:Date.now()});
  callPartner='';callSeconds=0;
};

window.toggleMute=function(){
  isMuted=!isMuted;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  const btn=document.getElementById('muteBtn');
  btn.textContent=isMuted?'🔇':'🎤';
  btn.classList.toggle('muted',isMuted);
  toast(isMuted?'Microphone muted 🔇':'Microphone on 🎤');
};

window.toggleCam=function(){
  isCamOff=!isCamOff;
  if(localStream) localStream.getVideoTracks().forEach(t=>t.enabled=!isCamOff);
  const btn=document.getElementById('camBtn');
  btn.textContent=isCamOff?'📵':'📷';
  btn.classList.toggle('off',isCamOff);
  toast(isCamOff?'Camera off':'Camera on 📷');
};

window.toggleSpeaker=function(){toast('Speaker toggle — use device volume buttons 🔊');};

window.shareRoom=function(){
  const url=`${location.href.split('?')[0]}?room=${encodeURIComponent(roomCode)}`;
  navigator.clipboard.writeText(url).then(()=>toast('Link copied! Share with friends 🎉')).catch(()=>toast(`Room code: ${roomCode}`));
};

window.handleKey=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
window.autoResize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';};

const urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom)document.getElementById('roomIn').value=decodeURIComponent(urlRoom);
</script>
