<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Helper AI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #00d4aa;
    --accent2: #7c5cfc;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --bubble-user: linear-gradient(135deg, #7c5cfc, #00d4aa);
    --bubble-ai: #1e2530;
    --online: #3fb950;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c5cfc, #00d4aa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .online-dot {
    width: 12px;
    height: 12px;
    background: var(--online);
    border-radius: 50%;
    position: absolute;
    bottom: 1px;
    right: 1px;
    border: 2px solid var(--surface);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
  }

  .header-info h1 {
    font-size: 17px;
    font-weight: 800;
    background: linear-gradient(90deg, #00d4aa, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.3px;
  }

  .header-info p {
    font-size: 12px;
    color: var(--online);
    font-weight: 600;
  }

  .header-badge {
    margin-left: auto;
    background: linear-gradient(135deg, #7c5cfc22, #00d4aa22);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }

  .msg-avatar.ai-av {
    background: linear-gradient(135deg, #7c5cfc, #00d4aa);
  }

  .msg-avatar.user-av {
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    color: white;
    font-size: 12px;
  }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.55;
    position: relative;
  }

  .bubble.ai {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--bubble-user);
    border-bottom-right-radius: 4px;
    color: white;
    font-weight: 600;
  }

  .bubble .time {
    display: block;
    font-size: 10.5px;
    margin-top: 4px;
    opacity: 0.55;
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
  }

  .bubble.ai .time { text-align: left; }

  .sender-name {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--accent);
  }

  .message-row.user .sender-name { display: none; }

  /* Typing indicator */
  .typing-bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    border-radius: 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14.5px;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }

  #userInput::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c5cfc, #00d4aa);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(0,212,170,0.3);
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,212,170,0.45); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { fill: white; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 30px 20px;
    animation: slideIn 0.5s ease;
  }

  .welcome .logo {
    font-size: 48px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px rgba(0,212,170,0.5));
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(90deg, #00d4aa, #7c5cfc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    max-width: 280px;
    margin: 0 auto 20px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 400px;
    margin: 0 auto;
  }

  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,170,0.08);
  }

  /* Username setup */
  .name-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    backdrop-filter: blur(6px);
  }

  .name-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .name-card .logo { font-size: 52px; margin-bottom: 14px; }
  .name-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px;
    background: linear-gradient(90deg, #00d4aa, #7c5cfc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .name-card p { color: var(--text-muted); font-size: 13.5px; margin-bottom: 22px; }

  .name-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }

  .name-btn {
    width: 100%;
    background: linear-gradient(135deg, #7c5cfc, #00d4aa);
    border: none;
    border-radius: 12px;
    padding: 13px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .name-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  .date-divider {
    text-align: center;
    color: var(--text-muted);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 4px 0;
    position: relative;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }
</style>
</head>
<body>

<!-- Name Modal -->
<div class="name-modal" id="nameModal">
  <div class="name-card">
    <div class="logo">📚</div>
    <h2>Study Helper AI</h2>
    <p>Your smart AI study companion. Enter your name to get started!</p>
    <input class="name-input" id="nameInput" placeholder="Your name..." maxlength="30" />
    <button class="name-btn" onclick="startChat()">Let's Go! 🚀</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="avatar">
    📚
    <div class="online-dot"></div>
  </div>
  <div class="header-info">
    <h1>Study Helper AI</h1>
    <p>● Online • Always Ready</p>
  </div>
  <div class="header-badge">FREE</div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="logo">📚</div>
    <h2>Study Helper AI</h2>
    <p>Ask me anything — math, science, history, languages, and more! I'm here to help you learn.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="quickSend('Who created you?')">👤 Who created you?</button>
      <button class="suggestion" onclick="quickSend('Explain photosynthesis')">🌿 Photosynthesis</button>
      <button class="suggestion" onclick="quickSend('Help me with algebra')">➗ Algebra help</button>
      <button class="suggestion" onclick="quickSend('What is the speed of light?')">💡 Speed of light</button>
      <button class="suggestion" onclick="quickSend('Write a short essay about climate change')">✍️ Essay help</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Ask anything..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" onclick="sendMessage()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  let userName = '';
  let chatHistory = [];
  let isTyping = false;

  const SYSTEM_PROMPT = `You are Study Helper AI, a friendly and knowledgeable AI study assistant created by Suvathikan. 

IMPORTANT IDENTITY RULES:
- Your name is "Study Helper AI"
- Your creator/owner/developer is Suvathikan
- If anyone asks "who made you", "who created you", "who is your owner", "who built you" or similar — always answer: "I was created by Suvathikan!"
- You are NOT Claude, NOT made by Anthropic (for the purposes of this app)
- You are a free study helper available to everyone

Your personality:
- Friendly, encouraging, and enthusiastic about learning
- Use simple language and clear explanations
- Add relevant emojis to make responses fun and engaging
- Break down complex topics into easy steps
- Always motivate students and celebrate their curiosity
- Keep responses concise but thorough

You help with: math, science, history, geography, languages, essays, coding, exam prep, and any school/university subjects.`;

  function startChat() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      document.getElementById('nameInput').style.borderColor = '#f85149';
      document.getElementById('nameInput').placeholder = 'Please enter your name!';
      return;
    }
    userName = name;
    document.getElementById('nameModal').style.display = 'none';

    setTimeout(() => {
      addMessage('ai', `Hey ${userName}! 👋 Welcome to Study Helper AI! I'm your personal study buddy, created by Suvathikan 🎓 Ask me anything — I'm here to help you learn and grow! What would you like to explore today?`);
    }, 300);
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startChat();
  });

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const initial = role === 'user' ? (userName[0] || 'U').toUpperCase() : '📚';
    const avClass = role === 'user' ? 'user-av' : 'ai-av';

    row.innerHTML = `
      <div class="msg-avatar ${avClass}">${initial}</div>
      <div>
        ${role === 'ai' ? '<div class="sender-name">Study Helper AI</div>' : ''}
        <div class="bubble ${role}">
          ${formatText(text)}
          <span class="time">${getTime()}</span>
        </div>
      </div>
    `;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:#0d1117;padding:1px 5px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:13px;">$1</code>')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'message-row ai';
    row.id = 'typingRow';
    row.innerHTML = `
      <div class="msg-avatar ai-av">📚</div>
      <div>
        <div class="sender-name">Study Helper AI</div>
        <div class="typing-bubble"><span></span><span></span><span></span></div>
      </div>
    `;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isTyping) return;

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);

    chatHistory.push({ role: 'user', content: text });

    isTyping = true;
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: chatHistory
        })
      });

      const data = await response.json();
      const reply = data.content?.map(b => b.text || '').join('') || 'Sorry, I had trouble responding. Please try again!';

      removeTyping();
      addMessage('ai', reply);
      chatHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      addMessage('ai', 'Oops! Something went wrong 😅 Please check your connection and try again.');
    }

    isTyping = false;
  }

  function quickSend(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
